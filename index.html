<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATEEM Widget</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #F5F0E8; /* أوف وايت */
  overflow: hidden;
}

/* 🔵 SMALL FLOATING WIDGET (NOT FULL SCREEN) */
#ateem-wrap {
  position: fixed;
  bottom: 90px;
  left: 16px;

  width: 72px;
  height: 72px;

  border-radius: 50%;
  overflow: hidden;

  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(18px);

  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* canvas MUST stay inside circle */
#ateem-wrap canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
</style>
</head>

<body>

<div id="ateem-wrap"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
const container = document.getElementById("ateem-wrap");

/* ======================
   SCENE
====================== */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.z = 3;

/* ======================
   RENDERER (LOCKED TO CIRCLE)
====================== */

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});

renderer.setPixelRatio(1);
renderer.setSize(72, 72, false);

container.appendChild(renderer.domElement);

/* ======================
   LIGHTS
====================== */

scene.add(new THREE.AmbientLight(0xffffff, 1.6));

const light1 = new THREE.PointLight(0xffffff, 2.5);
light1.position.set(2, 2, 2);
scene.add(light1);

const light2 = new THREE.PointLight(0xd4a97a, 1.8);
light2.position.set(-2, -2, 2);
scene.add(light2);

/* ======================
   CRYSTAL SPHERE
====================== */

const geometry = new THREE.SphereGeometry(1, 64, 64);

const material = new THREE.MeshPhysicalMaterial({
  color: 0xf5f0e8,
  roughness: 0.05,
  metalness: 0,
  transmission: 1,
  thickness: 2,
  ior: 1.5,
  clearcoat: 1,
  emissive: new THREE.Color(0xb8936a),
  emissiveIntensity: 0.2
});

const core = new THREE.Mesh(geometry, material);
scene.add(core);

/* ======================
   ANIMATION (STABLE)
====================== */

function animate() {
  requestAnimationFrame(animate);

  const t = performance.now() * 0.001;

  core.rotation.y = t * 0.4;
  core.rotation.x = Math.sin(t * 0.5) * 0.2;

  const breathe = 1 + Math.sin(t * 1.5) * 0.04;
  core.scale.set(breathe, breathe, breathe);

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
