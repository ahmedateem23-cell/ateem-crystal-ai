<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATEEM FINAL FIX</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at center, #0b0f1a, #05070d);
}

#wrap {
  position: fixed;
  inset: 0;
}
canvas {
  display: block;
}
</style>
</head>

<body>

<div id="wrap"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
const container = document.getElementById("wrap");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
camera.position.z = 3.2;

/* 🔥 IMPORTANT: FIXED RENDER SIZE (NO RESIZE EVENTS EVER) */
const RENDER_SIZE = 512; // ثابت 100%

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});

renderer.setSize(RENDER_SIZE, RENDER_SIZE, false);
renderer.setPixelRatio(1);

container.appendChild(renderer.domElement);

/* center canvas manually */
renderer.domElement.style.position = "absolute";
renderer.domElement.style.top = "50%";
renderer.domElement.style.left = "50%";
renderer.domElement.style.transform = "translate(-50%, -50%)";

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

const light1 = new THREE.PointLight(0xffffff, 3);
light1.position.set(3, 3, 3);
scene.add(light1);

const light2 = new THREE.PointLight(0xd4a97a, 2);
light2.position.set(-3, -2, 2);
scene.add(light2);

/* CRYSTAL */
const geometry = new THREE.SphereGeometry(1, 128, 128);

const material = new THREE.MeshPhysicalMaterial({
  color: 0xf5f0e8,
  roughness: 0.05,
  metalness: 0,
  transmission: 1,
  thickness: 2.5,
  ior: 1.5,
  clearcoat: 1,
  emissive: new THREE.Color(0xb8936a),
  emissiveIntensity: 0.2
});

const core = new THREE.Mesh(geometry, material);
scene.add(core);

/* FIXED ANIMATION (NO SCALE DEPENDENCY ON FRAME SIZE) */
function animate() {
  requestAnimationFrame(animate);

  const t = performance.now() * 0.001;

  core.rotation.y = t * 0.3;
  core.rotation.x = Math.sin(t * 0.5) * 0.2;

  const breathe = 1 + Math.sin(t * 1.5) * 0.03;
  core.scale.set(breathe, breathe, breathe);

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
