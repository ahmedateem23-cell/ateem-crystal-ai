<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATEEM Crystal Stable</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at center, #0b0f1a, #05070d);
}

canvas {
  display: block;
}
</style>
</head>

<body>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
/* ======================
   FIXED STABLE SETUP
====================== */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.z = 3.2;

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true,
  powerPreference: "high-performance"
});

/* 🔥 IMPORTANT FIX */
renderer.setPixelRatio(1); // 👈 يمنع الاهتزاز داخل iframe
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

document.body.appendChild(renderer.domElement);

/* ======================
   LIGHTS (STABLE)
====================== */

scene.add(new THREE.AmbientLight(0xffffff, 1.4));

const light1 = new THREE.PointLight(0xffffff, 2.5);
light1.position.set(3, 3, 3);
scene.add(light1);

const light2 = new THREE.PointLight(0xd4a97a, 2);
light2.position.set(-3, -2, 2);
scene.add(light2);

/* ======================
   CRYSTAL CORE
====================== */

const geometry = new THREE.SphereGeometry(1, 96, 96);

const material = new THREE.MeshPhysicalMaterial({
  color: 0xf5f0e8,
  roughness: 0.05,
  metalness: 0.0,
  transmission: 1.0,
  thickness: 2.5,
  ior: 1.5,
  clearcoat: 1,
  clearcoatRoughness: 0.05,
  emissive: new THREE.Color(0xb8936a),
  emissiveIntensity: 0.2
});

const core = new THREE.Mesh(geometry, material);
scene.add(core);

/* ======================
   FIXED ANIMATION
====================== */

function animate() {
  requestAnimationFrame(animate);

  /* 🔥 smooth rotation (no jitter) */
  core.rotation.y += 0.002;
  core.rotation.x += 0.001;

  /* 🔥 smooth breathing */
  const t = performance.now() * 0.001;
  const breathe = 1 + Math.sin(t) * 0.03;
  core.scale.set(breathe, breathe, breathe);

  renderer.render(scene, camera);
}

animate();

/* ======================
   RESPONSIVE (SAFE)
====================== */

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
