<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATEEM FINAL FIX</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #0b0f1a, #05070d);
}

/* 🔥 IMPORTANT: force canvas to ALWAYS fill screen */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>

<body>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
/* =========================
   SCENE
========================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.z = 3.2;

/* =========================
   RENDERER (CRITICAL FIX)
========================= */

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});

document.body.appendChild(renderer.domElement);

/* 🔥 KEY FIX: match real screen size ALWAYS */
function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener("resize", resize);
resize();

/* =========================
   LIGHTS
========================= */

scene.add(new THREE.AmbientLight(0xffffff, 1.6));

const light1 = new THREE.PointLight(0xffffff, 3);
light1.position.set(3, 3, 3);
scene.add(light1);

const light2 = new THREE.PointLight(0xd4a97a, 2);
light2.position.set(-3, -2, 2);
scene.add(light2);

/* =========================
   CRYSTAL CORE
========================= */

const geometry = new THREE.SphereGeometry(1, 128, 128);

const material = new THREE.MeshPhysicalMaterial({
  color: 0xf5f0e8,
  roughness: 0.04,
  metalness: 0.0,
  transmission: 1,
  thickness: 2.5,
  ior: 1.5,
  clearcoat: 1,
  emissive: new THREE.Color(0xb8936a),
  emissiveIntensity: 0.25
});

const core = new THREE.Mesh(geometry, material);
scene.add(core);

/* =========================
   ANIMATION (SMOOTH)
========================= */

function animate() {
  requestAnimationFrame(animate);

  const t = performance.now() * 0.001;

  core.rotation.y = t * 0.3;
  core.rotation.x = Math.sin(t * 0.4) * 0.2;

  const breathe = 1 + Math.sin(t * 1.5) * 0.03;
  core.scale.set(breathe, breathe, breathe);

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
